            "@type": "Answer",
            "text": "Sunu Yoon met en relation conducteurs et passagers pour partager des trajets au Sénégal. Les conducteurs publient leurs trajets avec le prix en FCFA, la date et les places disponibles. Les passagers recherchent un trajet et réservent directement."

          }
        },
        {
          "@type": "Question",
          "name": "Comment payer mon trajet sur Sunu Yoon ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Plusieurs options : paiement par Orange Money, Wave, ou en espèces directement au conducteur. Les paiements mobiles sont sécurisés et instantanés."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles villes sont couvertes par Sunu Yoon ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Toutes les villes du Sénégal : Dakar, Thiès, Saint-Louis, Touba, Kaolack, Ziguinchor, Rufisque, Mbour, Saly, Tambacounda, Kolda, Fatick, Louga, Matam, Kédougou, Sédhiou, Diourbel, Pikine, Guédiawaye, Cap Skirring, et bien d'autres."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte un trajet Dakar Saint-Louis ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les prix varient selon les conducteurs, généralement entre 3000 et 7000 FCFA par place. C'est moins cher que le bus ou le taxi 7 places. Consultez les trajets disponibles sur Sunu Yoon pour comparer."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce sécurisé ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui ! Tous nos membres sont vérifiés par numéro de téléphone. Vous pouvez consulter les avis et notes des conducteurs avant de réserver. Le suivi GPS en temps réel est disponible pendant le trajet."
          }
        }
