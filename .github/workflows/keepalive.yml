name: Keep Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Route
        run: curl -f -s -o /dev/null -w %{http_code}\n https://sunu-yoon-backend.onrender.com/api/health || echo Ping failed
